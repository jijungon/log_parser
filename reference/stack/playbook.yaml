# ─────────────────────────────────────────────────────────────────
# 카테고리별 플레이북 (연결됨 — analyze.py 가 답변 생성 시 주입)
#
# 용도: 분석 LLM·대처방안 AI 의 프롬프트에 주입되어 답변의 틀이 된다.
#   LLM 역할이 "백지 창작" → "이 목록 중 로그와 맞는 것을 고르고
#   구체값(프로세스명·장치명·시각)을 채우기"로 줄어든다.
#
# ⚠️ 여기 내용이 틀리면 모든 답변이 같이 틀린다. 사용 중 👎 코멘트로
#   잡힌 오류는 이 파일을 직접 수정 (재빌드 불필요, serve 재시작만).
#
# 카테고리의 원본(진실의 원천)은 log_parseer_ai/config/categories.yaml.
#   파서에 카테고리를 추가/변경하면 → 이 파일 + extract.py 의 CATEGORY_KO
#   + goldset 질문을 같이 갱신할 것. (현재 20/20 정합, system.general 제외)
#
# 형식: 카테고리마다 흔한_원인 / 확인_명령 / 표준_대처 세 목록.
# ─────────────────────────────────────────────────────────────────

kernel.oom:
  흔한_원인:
    - 애플리케이션 메모리 누수 (장시간 운영 후 점진적 증가)
    - 트래픽·작업량 급증으로 순간 메모리 수요 초과
    - 스왑 미설정 또는 부족
    - JVM 힙 등 애플리케이션 메모리 설정이 호스트 용량 대비 과다
  진단_단서:                       # 로그에 "보이면" → 그 "원인"을 우선 제시 (실경험으로 확장)
    - 보이면: 같은 프로세스가 반복적으로 OOM-kill 됨
      원인: 해당 앱의 메모리 누수 가능 → 앱 버전 확인·롤백/패치
    - 보이면: 트래픽·작업량 급증 시각과 OOM 시각이 겹침
      원인: 순간 수요 초과 → 메모리 증설 또는 워크로드 분산
    - 보이면: free·swapon 출력에 스왑이 없거나 거의 0
      원인: 스왑 미설정·부족 → 스왑 추가로 완충
  확인_명령:
    - dmesg -T | grep -i 'out of memory'
    - free -h && swapon --show
    - ps aux --sort=-%mem | head -10
    - journalctl -k --since "1 hour ago" | grep -i oom
  표준_대처:
    - "즉시: 죽은 서비스 재기동 후 정상 동작 확인"
    - "원인 해소: 메모리 사용 추이 확인 → 누수면 해당 버전 롤백/패치, 수요 초과면 메모리 증설 또는 워크로드 분산"
    - "재발 방지: 메모리 사용률 80% 알림 설정"
    - "재발 방지: 중요 프로세스 OOM 우선순위 낮추기 — systemd 유닛에 OOMScoreAdjust=-500 추가
      (또는 실행 중 프로세스는 echo -500 > /proc/<PID>/oom_score_adj).
      ⚠️ sysctl 로 조정하는 값이 아님"

disk.io_error:
  흔한_원인:
    - 디스크 물리적 불량 (배드섹터)
    - 케이블·컨트롤러 등 연결 계통 문제
    - 가상화 환경이라면 하이퍼바이저/스토리지 백엔드 장애
  진단_단서:                       # 로그에 "보이면" → 그 "원인"을 우선 제시 (실경험으로 확장)
    - 보이면: 특정 sector·dev 에서 I/O error 가 반복됨
      원인: 디스크 물리 불량(배드섹터) 가능 → smartctl 로 SMART 확인, 불량이면 교체
    - 보이면: SMART 는 정상인데 간헐적 I/O error
      원인: 케이블·컨트롤러 등 연결 계통 문제 → 포트·케이블 점검
    - 보이면: 가상화 환경이고 동시간 호스트·스토리지 로그에도 오류
      원인: 하이퍼바이저·스토리지 백엔드 장애 → 백엔드부터 점검
  확인_명령:
    - dmesg -T | grep -iE 'i/o error|blk_update'
    - smartctl -a /dev/<장치명>
    - lsblk && df -h
  표준_대처:
    - "즉시: 해당 디스크의 중요 데이터 백업 (추가 손상 전에)"
    - "원인 해소: SMART 결과가 불량이면 디스크 교체, 정상이면 케이블·포트 점검"
    - "재발 방지: smartd 모니터링 활성화, RAID/백업 구성 점검"

fs.error:
  흔한_원인:
    - 비정상 종료(전원 차단 등) 후 저널 불일치
    - 기반 디스크의 I/O 오류가 파일시스템 손상으로 전이
    - 파일시스템 버그 또는 마운트 옵션 문제
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 같은 dev 에서 disk.io_error 가 EXT4-fs/XFS 오류와 동반됨
      원인: 기반 디스크 I/O 오류가 파일시스템 손상으로 전이 → 디스크부터 점검
    - 보이면: 비정상 종료(전원 차단·패닉) 직후 첫 마운트에서 EXT4-fs error/XFS Internal error
      원인: 저널 불일치 가능 → umount 후 fsck 로 점검·복구
    - 보이면: 디스크는 정상인데 특정 파일시스템에서만 오류 반복
      원인: fs 버그·마운트 옵션 문제 가능 → 커널/드라이버 버전·마운트 옵션 확인
  확인_명령:
    - dmesg -T | grep -iE 'ext4|xfs'
    - mount | grep <마운트포인트>
    - "umount 후: fsck -n /dev/<장치명>  (읽기전용 점검)"
  표준_대처:
    - "즉시: 같은 장치의 disk.io_error 동반 여부 확인 — 동반이면 디스크 문제가 먼저"
    - "원인 해소: 유지보수 시간에 umount → fsck 복구 → 재마운트"
    - "재발 방지: 정전 대비 UPS/graceful shutdown 구성"

fs.readonly:
  흔한_원인:
    - 파일시스템 오류 감지 시 커널의 자기보호 (errors=remount-ro)
    - 기반 디스크 장애
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: fs.error·disk 오류 직후 "remounting filesystem read-only"
      원인: 오류 감지 시 커널 자기보호(errors=remount-ro) 발동 → 선행 오류부터 해결
    - 보이면: 선행 오류 로그 없이 갑자기 read-only 재마운트
      원인: 기반 디스크 장애 가능 → SMART·링크 오류 동반 여부 확인
  확인_명령:
    - mount | grep ' ro,'
    - dmesg -T | tail -50
  표준_대처:
    - "즉시: 쓰기가 필요한 서비스 중단 여부 확인 (DB 등은 이미 영향받았을 가능성)"
    - "원인 해소: 원인이 된 fs.error/disk 오류를 먼저 해결한 뒤 재마운트 또는 재부팅"
    - "재발 방지: 디스크 건강 모니터링 + 파일시스템 정기 점검"

systemd.restart_loop:
  흔한_원인:
    - 서비스 설정 오류로 기동 직후 즉시 종료
    - 의존 서비스(DB·네트워크) 미준비 상태에서 기동 시도
    - 실행 파일/설정 파일 누락 또는 권한 문제
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 기동 직후 수 초 내 반복 종료로 "Start request repeated too quickly"
      원인: 서비스가 기동 즉시 실패 → journalctl 로 실제 종료 사유부터 확인
    - 보이면: DB·네트워크 등 의존 서비스가 준비되기 전 시각에 반복 재시작
      원인: 의존성 미준비 상태 기동 가능 → After=/Requires= 로 순서 보장
    - 보이면: 종료 사유가 권한·파일 없음(exit-code) 계열
      원인: 실행 파일/설정 경로·권한 문제 가능 → 경로·퍼미션 점검
  확인_명령:
    - systemctl status <서비스명>
    - journalctl -u <서비스명> -n 50
    - systemctl cat <서비스명>
  표준_대처:
    - "즉시: systemctl stop 으로 루프 중단 (리소스 낭비 방지)"
    - "원인 해소: journalctl 의 실제 종료 사유 확인 → 설정/의존성 수정 후 기동"
    - "재발 방지: RestartSec 증가, After=/Requires= 의존성 명시"

auth.bruteforce:
  흔한_원인:
    - 인터넷 노출된 ssh 포트에 대한 자동화 공격 (가장 흔함)
    - 특정 IP 의 표적 공격
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 짧은 시간에 여러 사용자명으로 "Failed password for invalid user" 다발
      원인: 자동화 사전(dictionary) 공격 가능 → 출처 IP 차단, 성공 로그인 유무 반드시 확인
    - 보이면: 역방향 DNS 불일치 경고인 "POSSIBLE BREAK-IN ATTEMPT" 출현
      원인: 위조·비정상 출처의 접속 시도 → 해당 IP 조사·차단
    - 보이면: 특정 IP 에서만 "Too many authentication failures" 반복
      원인: 그 IP 의 표적 공격 가능 → 우선 차단, fail2ban 검토
  확인_명령:
    - grep 'Failed password' /var/log/auth.log | awk '{print $(NF-3)}' | sort | uniq -c | sort -rn | head
    - last -20
    - ss -tnp | grep :22
  표준_대처:
    - "즉시: 공격 IP 차단 (iptables/ufw deny), 성공한 로그인이 있는지 반드시 확인"
    - "원인 해소: 비밀번호 인증 비활성화(PasswordAuthentication no), 키 인증만 허용"
    - "재발 방지: fail2ban 설치, ssh 포트 변경 또는 VPN 뒤로 이동, root 로그인 금지"

auth.event:
  흔한_원인:
    - 정상 운영 로그인 (관리자·배포 도구·cron)
    - 비정상이라면 탈취된 계정의 로그인일 가능성
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 예상 시각·IP 와 일치하는 "Accepted publickey/password" (관리자·배포·cron)
      원인: 정상 운영 로그인일 가능성 높음 → 과잉대응 불필요, 기록만
    - 보이면: 로그인 실패 다발 직후 같은 출처에서 "Accepted"
      원인: bruteforce 후 성공 가능성 → 해당 세션·IP 즉시 점검
    - 보이면: 모르는 시각·IP 에서 "Accepted" 또는 "Disconnected from user"
      원인: 탈취 계정 로그인 가능 → 세션 종료 후 키/암호 교체
  확인_명령:
    - last -20
    - grep 'Accepted' /var/log/auth.log | tail -20
  표준_대처:
    - "즉시: 로그인 시각·IP·계정이 예상된 것인지 확인"
    - "원인 해소: 모르는 IP 면 세션 강제 종료 + 키/암호 교체"
    - "재발 방지: 로그인 알림 설정, 미사용 계정 비활성화"

session.activity:
  흔한_원인:
    - 정상적인 로그인/로그아웃 또는 cron·systemd 세션 수명주기 (대개 무해)
    - 세션이 비정상적으로 자주 생성·종료되면 자동화 오작동·반복 크론 의심
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: cron·systemd 세션 open/close 가 평소 빈도로 규칙적으로 반복
      원인: 정상 세션 수명주기일 가능성 높음(대개 무해) → 조치 불필요
    - 보이면: 짧은 시간에 "New/Started/Removed session" 이 비정상적으로 잦음
      원인: 반복 크론·자동화 오작동 가능 → 해당 작업의 세션 생성 주기 점검
    - 보이면: 세션 활동에 낯선 사용자명이 섞임
      원인: 인증 관련 이상 가능 → auth.event 로 교차 확인
  확인_명령:
    - loginctl list-sessions
    - journalctl _COMM=systemd-logind --since "1 hour ago"
    - last -20
  표준_대처:
    - "즉시: 세션 생성/종료 빈도가 평소와 다른지 확인 (대부분 정상 활동)"
    - "원인 해소: 과도하면 해당 cron/서비스의 세션 생성 주기 점검"
    - "재발 방지: 불필요하게 잦은 세션 생성 작업 정리, 인증 관련이면 auth.event 로 교차 확인"

container.oom:
  흔한_원인:
    - 컨테이너 메모리 limit 이 워크로드 대비 과소
    - 컨테이너 내부 애플리케이션 메모리 누수
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 특정 컨테이너만 반복적으로 "Memory cgroup out of memory"
      원인: 그 컨테이너 앱 누수 또는 limit 과소 → 사용 추이 확인 후 limit 상향·앱 점검
    - 보이면: 호스트 전체는 메모리 여유가 있는데 cgroup OOM 발생
      원인: 컨테이너 메모리 limit 이 워크로드 대비 과소 → limit 재조정
  확인_명령:
    - docker stats --no-stream
    - docker inspect <컨테이너> | grep -i memory
    - dmesg -T | grep -i 'memory cgroup'
  표준_대처:
    - "즉시: 컨테이너 재기동 확인 (restart policy 동작 여부)"
    - "원인 해소: 사용 추이 보고 limit 상향 또는 앱 메모리 설정 조정"
    - "재발 방지: 컨테이너별 메모리 알림, limit 은 평시 사용량의 1.5~2배로"

# ── 이하 12개: log_parseer_ai/config/categories.yaml 기준으로 보강 (2026-06-11) ──
# 파서가 분류할 수 있는 전체 카테고리(20개, system.general 제외)와 1:1 정합.

kernel.panic:
  흔한_원인:
    - 하드웨어 결함 (메모리·CPU)
    - 커널 모듈/드라이버 버그
    - 디스크·파일시스템 손상으로 인한 부팅 실패
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 패닉 메시지에 특정 드라이버·모듈명이 반복 등장
      원인: 그 커널 모듈/드라이버 버그 가능 → 해당 드라이버 업데이트/롤백
    - 보이면: hw.mce(메모리·CPU 오류)와 근접한 시각에 패닉
      원인: 하드웨어 결함 가능 → 메모리·CPU 진단(memtest) 예약
    - 보이면: 부팅 중 디스크·파일시스템 오류 직후 패닉
      원인: 디스크·fs 손상으로 부팅 실패 가능 → 복구 모드에서 fsck
  확인_명령:
    - journalctl -k -b -1 -n 100   # 직전 부팅의 마지막 커널 로그
    - ls /var/crash/               # kdump 덤프 존재 여부
  표준_대처:
    - "즉시: 재부팅 후 서비스 정상화 확인, 패닉 직전 로그 확보"
    - "원인 해소: 패닉 메시지의 모듈명 확인 → 해당 드라이버/커널 업데이트 또는 롤백"
    - "재발 방지: kdump 설정으로 다음 패닉 때 덤프 수집, 하드웨어 진단(memtest) 예약"

kernel.bug:
  흔한_원인:
    - 커널 자체 버그 (특정 커널 버전의 알려진 결함)
    - 서드파티 커널 모듈의 결함
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: BUG 메시지의 "kernel BUG at" 파일·줄 경로가 커널 코어(mm/·fs/ 등)
      원인: 커널 자체 버그 가능 → 그 파일:줄로 버그트래커 검색, 패치 버전으로 업데이트
    - 보이면: BUG 스택에 서드파티(비표준) 모듈명이 보임
      원인: 서드파티 커널 모듈 결함 가능 → 해당 모듈 업데이트/제거
  확인_명령:
    - journalctl -k | grep -A5 'kernel BUG'
    - uname -r && lsmod | head
  표준_대처:
    - "즉시: BUG 발생 후 시스템 동작이 불안정하면 계획 재부팅"
    - "원인 해소: 'kernel BUG at 파일:줄' 메시지로 커널 버그트래커 검색 → 패치된 버전으로 업데이트"
    - "재발 방지: 커널 업데이트 정책 수립, 불필요한 서드파티 모듈 제거"

process.crash:
  흔한_원인:
    - 애플리케이션 버그 (널 포인터 등 메모리 접근 오류)
    - 라이브러리 버전 불일치
    - 메모리 부족·손상과의 복합 작용
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 같은 프로세스가 유사한 주소 부근에서 반복 "segfault at"
      원인: 그 앱의 재현성 버그 가능 → 코어덤프 스택으로 결함 위치 확인·패치
    - 보이면: 라이브러리 업데이트·배포 직후부터 crash 시작
      원인: 라이브러리 버전 불일치 가능 → 의존성 버전 정합 확인/롤백
    - 보이면: hw.mce·kernel.oom 과 동반된 산발적 crash
      원인: 메모리 부족·손상과의 복합 작용 가능 → 메모리 상태부터 점검
  확인_명령:
    - journalctl | grep segfault | tail -20
    - coredumpctl list | tail -10
    - coredumpctl info <PID>       # 코어덤프가 있으면 스택 확인
  표준_대처:
    - "즉시: 해당 서비스 재기동, 반복되면 이전 버전으로 롤백"
    - "원인 해소: 코어덤프 스택트레이스로 결함 위치 확인 → 패치 또는 업스트림 버그 리포트"
    - "재발 방지: 자동 재시작(Restart=on-failure) 설정 + 크래시 알림"

hw.mce:
  흔한_원인:
    - 메모리(DIMM) 불량 — 가장 흔함
    - CPU·메인보드 결함, 과열
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: EDAC MC 메시지에 특정 DIMM 슬롯·채널이 반복
      원인: 그 메모리 모듈 불량 가능(가장 흔함) → 해당 DIMM 교체
    - 보이면: 정정 불가(UE, uncorrected) 오류
      원인: 즉각 위험 → 해당 하드웨어 즉시 조치 (산발적 정정됨 CE 는 관찰)
    - 보이면: 온도 상승과 함께 "Machine Check" 발생
      원인: 과열로 인한 CPU·메인보드 오류 가능 → 냉각·온도 점검
  확인_명령:
    - journalctl -k | grep -iE 'mce|edac|hardware error' | tail -20
    - rasdaemon 또는 mcelog 기록 확인
    - sensors                       # 온도 확인
  표준_대처:
    - "즉시: 오류 빈도 확인 — 산발적 CE(정정됨)는 관찰, UE(정정 불가)는 즉시 조치"
    - "원인 해소: EDAC 메시지의 DIMM 슬롯 위치 확인 → 해당 모듈 교체"
    - "재발 방지: rasdaemon 상시 가동, 정기 점검 주기에 메모리 진단 포함"

disk.smart_error:
  흔한_원인:
    - 디스크 수명 임박 (재할당 섹터 증가, 임계값 초과)
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: "SMART ... Threshold Exceeded"
      원인: 디스크 수명 임박(임계 초과는 회복 불가) → 즉시 백업·교체 일정 수립
    - 보이면: 재할당(reallocated)·대기(pending) 섹터 수가 증가 추세
      원인: 디스크 물리 열화 진행 → smartctl 로 확인 후 교체
  확인_명령:
    - smartctl -a /dev/<장치명> | grep -iE 'reallocated|pending|health'
    - smartctl -t short /dev/<장치명>   # 자가진단 실행
  표준_대처:
    - "즉시: 해당 디스크 데이터 백업 (SMART 경고는 예고장)"
    - "원인 해소: 디스크 교체 일정 수립 — SMART 임계 초과 디스크는 회복되지 않음"
    - "재발 방지: smartd 모니터링 + 주기적 자가진단 스케줄"

disk.link_error:
  흔한_원인:
    - SATA 케이블·커넥터 접촉 불량
    - 전원 불안정, 백플레인/포트 결함
    - 디스크 자체 고장의 전조
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 특정 ata 포트에서 "hard resetting link"·"exception Emask" 반복
      원인: 그 포트의 케이블·커넥터 접촉 불량 가능 → 케이블 재연결/교체
    - 보이면: 링크 오류에 I/O error 가 동반됨
      원인: 디스크 고장 전조 가능 → disk.io_error 절차 우선, SMART 확인
    - 보이면: 여러 디스크에서 동시에 "SATA link down"·링크 리셋
      원인: 전원·백플레인 등 공통 계통 문제 가능 → 전원·백플레인 점검
  확인_명령:
    - dmesg -T | grep -iE 'ata|link|reset' | tail -20
    - smartctl -a /dev/<장치명>     # 링크 오류가 디스크 문제인지 확인
  표준_대처:
    - "즉시: I/O 오류 동반 여부 확인 — 동반 시 disk.io_error 절차 우선"
    - "원인 해소: 점검 시간에 케이블 재연결/교체 → 재발 시 포트 변경 → 그래도 재발 시 디스크 의심"
    - "재발 방지: 링크 리셋 빈도 모니터링 (간헐적 1~2회는 관찰, 반복은 조치)"

net.error:
  흔한_원인:
    - conntrack 테이블 가득 참 (연결 폭주·포트스캔)
    - TCP 메모리 한도 초과
    - NIC 드라이버·오프로딩 문제
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: "nf_conntrack: table full"
      원인: 연결 추적 테이블 가득 → 폭주 원인(공격/정상) 구분 후 max 상향 또는 차단
    - 보이면: "TCP: out of memory"
      원인: TCP 메모리 한도 초과 → 소켓 사용량 확인, tcp_mem 한도 검토
    - 보이면: 트래픽 급증·포트스캔 시각과 conntrack 가득이 겹침
      원인: 연결 폭주(공격 가능) → 출처 확인 후 차단
  확인_명령:
    - ss -s                          # 소켓 통계
    - cat /proc/sys/net/netfilter/nf_conntrack_count /proc/sys/net/netfilter/nf_conntrack_max
    - ip -s link                     # 인터페이스 에러 카운터
  표준_대처:
    - "즉시: conntrack 가득이면 폭주 원인(공격/정상 트래픽) 구분부터"
    - "원인 해소: 정상 트래픽 증가면 nf_conntrack_max 상향, 공격이면 차단"
    - "재발 방지: conntrack 사용률 알림, TCP 메모리 한도 검토"

net.watchdog:
  흔한_원인:
    - NIC 드라이버 행(hang)
    - 펌웨어 버그, 하드웨어 결함
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 특정 인터페이스에서 "NETDEV WATCHDOG ... transmit queue timed out"
      원인: 그 NIC 드라이버 행(hang) 가능 → 인터페이스 리셋, 드라이버/펌웨어 업데이트
    - 보이면: 드라이버/펌웨어 업데이트 후에도 반복
      원인: 하드웨어 결함 가능 → NIC 교체 검토
  확인_명령:
    - dmesg -T | grep -iE 'watchdog|transmit queue' | tail
    - ethtool -i <인터페이스>        # 드라이버·펌웨어 버전
  표준_대처:
    - "즉시: 인터페이스 리셋 — ip link set <인터페이스> down && up"
    - "원인 해소: 드라이버/펌웨어 업데이트, 오프로딩 기능(tso/gso) 끄고 재현 여부 확인"
    - "재발 방지: 반복되면 NIC 교체 검토"

systemd.unit_failure:
  흔한_원인:
    - 설정 파일 오류·누락
    - 의존 서비스 미기동, 포트 충돌
    - 실행 파일 경로·권한 문제
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 유닛 기동 시 "Failed to start" 직후 멈춤
      원인: 기동 자체 실패 → journalctl 로 실제 사유 확인(status 한 줄로 판단 말 것)
    - 보이면: 종료 로그에 "failed with result" 사유가 함께 찍힘
      원인: 결과 코드가 원인 힌트 → 설정 오류·의존성·포트 충돌 중 해당 분기 점검
    - 보이면: 실패 후 반복 재시작으로 이어짐
      원인: systemd.restart_loop 로 발전 가능 → 재시작 정책과 함께 점검
  확인_명령:
    - systemctl status <유닛명>
    - journalctl -u <유닛명> -n 50
    - systemd-analyze verify <유닛파일>
  표준_대처:
    - "즉시: journalctl 의 실제 실패 사유 확인 (status 의 한 줄로 판단하지 말 것)"
    - "원인 해소: 사유별 — 설정 오류는 수정, 의존성은 After=/Requires= 보강, 포트 충돌은 점유 프로세스 정리"
    - "재발 방지: 배포 전 systemd-analyze verify, 변경 이력 기록"

auth.failure:
  흔한_원인:
    - 사용자의 단순 오타 (소수, 산발적)
    - 자동화 스크립트의 만료된 인증정보 (규칙적 반복)
    - 공격 전조 (다수, 모르는 IP — auth.bruteforce 로 발전)
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 산발적 소수의 "Failed password", 대부분 곧 성공으로 이어짐
      원인: 단순 오타일 가능성 → 조치 불필요, 기록만
    - 보이면: 규칙적 주기로 같은 계정 실패 반복(같은 내부 IP)
      원인: 자동화 스크립트의 만료된 인증정보 가능 → 크론/스크립트 자격증명 갱신
    - 보이면: 모르는 IP 다수에서 실패 급증
      원인: 공격 전조 가능 → auth.bruteforce 절차로 전환, IP 차단
  확인_명령:
    - grep 'Failed password' /var/log/auth.log | tail -20
    - grep 'Failed password' /var/log/auth.log | awk '{print $(NF-3)}' | sort | uniq -c | sort -rn | head
  표준_대처:
    - "즉시: 실패 패턴 구분 — 같은 IP 반복이면 bruteforce 절차로 전환"
    - "원인 해소: 내부 계정이면 만료된 크론/스크립트 인증정보 갱신"
    - "재발 방지: 실패 횟수 임계 알림 설정"

ntp.drift:
  흔한_원인:
    - NTP 서버 접근 불가 (방화벽·네트워크)
    - 가상머신의 클럭 드리프트
    - RTC(하드웨어 시계) 배터리 문제
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: 큰 폭의 "time stepped"·"time step detected"·"System clock wrong"
      원인: 시간이 크게 어긋나 강제 보정됨(인증·로그 정합 영향) → 영향 서비스 확인
    - 보이면: 재부팅 후마다 시간이 크게 틀어짐
      원인: RTC(하드웨어 시계) 배터리 문제 가능 → 배터리 점검
    - 보이면: VM 에서 반복적 드리프트
      원인: 게스트 클럭 드리프트 가능 → 하이퍼바이저 시간 동기화 설정 점검
  확인_명령:
    - timedatectl status
    - chronyc tracking && chronyc sources -v    # (chrony 사용 시)
  표준_대처:
    - "즉시: 시간이 크게 틀어졌으면 인증·로그 정합에 영향 — 강제 동기화 후 영향 서비스 확인"
    - "원인 해소: NTP 서버 도달성 확인, VM 이면 하이퍼바이저 시간 동기화 설정 점검"
    - "재발 방지: chrony 의 makestep 설정, 드리프트 모니터링"

selinux.denial:
  흔한_원인:
    - 정상 동작이 정책에 미등록 (새 서비스·경로 추가 후)
    - 파일 컨텍스트 불일치 (복사·이동 후)
    - 실제 비정상 접근 시도
  진단_단서:                       # 2026-07-09 P1 진단_단서 추가
    - 보이면: '새 서비스·경로 추가 직후 그 경로에 대한 "avc: denied"/"type=AVC"'
      원인: 정상 동작이 정책에 미등록 가능 → 정책 보완(보안 끄기로 덮지 말 것)
    - 보이면: 파일 복사·이동 후 그 파일 접근에서 denied
      원인: 파일 컨텍스트 불일치 가능 → restorecon 으로 컨텍스트 복구
    - 보이면: 예상치 못한 프로세스가 민감 경로에 반복 denied
      원인: 실제 비정상 접근 시도 가능 → 접근 주체·경로 조사
  확인_명령:
    - ausearch -m avc -ts recent
    - journalctl | grep -i 'apparmor=\"DENIED\"' | tail    # (Ubuntu/AppArmor)
  표준_대처:
