services:
  test-server:
    container_name: test-server
    image: test-server
    build: ./app
    pull_policy: never
    ports:
      - "${RECV_PORT:-8080}:8080"
    environment:
      RECV_TOKEN: ${RECV_TOKEN:-test-token}
      AGENT_HOST: ${AGENT_HOST:-host.docker.internal}
      STAT_TOKEN: ${STAT_INBOUND_TOKEN:-stat-secret}
      SOS_TOKEN: ${SOS_INBOUND_TOKEN:-sos-secret}
    volumes:
      - ./storage:/app/storage
      - ../docs:/app/docs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
